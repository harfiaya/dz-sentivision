<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب - DZ-SentiVision</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* أنماط CSS كما هي - احتفظ بها كما كانت */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', 'Segoe UI', sans-serif;
        }
        
        body {
            background-image: linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.5)),url('nano.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 20px;
        }
        
        .logo {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .logo img {
            width: 200px;
            height: auto;
        }
        
        .signup-card {
            background-color: rgb(213, 226, 231);
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
            padding: 40px 30px;
            width: 100%;
            transition: transform 0.3s ease;
        }
        
        .signup-card:hover {
            transform: translateY(-5px);
        }
        
        .signup-card h2 {
            color: #07264a;
            font-size: 2rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 3px solid #308dea;
            padding-bottom: 15px;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        .input-group label {
            display: block;
            color: #07264a;
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 5px;
        }
        
        .input-group input {
            width: 100%;
            padding: 12px 20px;
            border: 2px solid #ddd;
            border-radius: 50px;
            font-size: 1rem;
            transition: all 0.3s;
            background-color: white;
        }
        
        .input-group input:focus {
            outline: none;
            border-color: #308dea;
            box-shadow: 0 0 10px rgba(48, 141, 234, 0.3);
        }
        
        .terms {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 20px 0;
            color: #07264a;
        }
        
        .terms input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        
        .terms label {
            font-size: 0.95rem;
        }
        
        .terms a {
            color: #04446c;
            text-decoration: none;
            font-weight: 600;
        }
        
        .terms a:hover {
            text-decoration: underline;
        }
        
        .signup-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(to right, #04446c, #308dea);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }
        
        .signup-btn:hover {
            background: linear-gradient(to right, #308dea, #04446c);
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .login-link {
            text-align: center;
            color: #07264a;
            font-size: 1.1rem;
        }
        
        .login-link a {
            color: #04446c;
            font-weight: 700;
            text-decoration: none;
            transition: color 0.3s;
        }
        
        .login-link a:hover {
            color: #308dea;
            text-decoration: underline;
        }
        
        .or-divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 20px 0;
            color: #07264a;
        }
        
        .or-divider::before,
        .or-divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #308dea;
        }
        
        .or-divider::before {
            margin-left: 10px;
        }
        
        .or-divider::after {
            margin-right: 10px;
        }
        
        .social-signup {
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        
        .social-btn {
            background-color: white;
            border: 2px solid #308dea;
            border-radius: 50px;
            padding: 10px 20px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1rem;
            color: #07264a;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .social-btn i {
            color: #308dea;
            font-size: 1.2rem;
        }
        
        .social-btn:hover {
            background-color: #308dea;
            color: white;
        }
        
        .social-btn:hover i {
            color: white;
        }
        
        .password-hint {
            font-size: 0.8rem;
            color: #04446c;
            margin-top: 5px;
            margin-right: 15px;
        }
        
        .back-home {
            text-align: center;
            margin-top: 20px;
        }
        
        .back-home a {
            color: white;
            text-decoration: none;
            font-size: 1rem;
            transition: color 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        
        .back-home a:hover {
            color: #308dea;
        }
        
        footer {
            color: white;
            text-align: center;
            padding: 10px;
            margin-top: 10px;
            font-size: 1rem;
            opacity: 0.8;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <img src="222.png" alt="DZ-SentiVision">
        </div>
        
        <div class="signup-card">
            <h2>إنشاء حساب جديد</h2>
            
            <form id="signupForm">
                <div class="input-group">
                    <label><i class="fas fa-user"></i> الاسم الكامل</label>
                    <input type="text" id="fullname" placeholder="أدخل اسمك الكامل" required>
                </div>
                
                <div class="input-group">
                    <label><i class="fas fa-envelope"></i> البريد الإلكتروني</label>
                    <input type="email" id="email" placeholder="أدخل بريدك الإلكتروني" required>
                </div>
                
                <div class="input-group">
                    <label><i class="fas fa-lock"></i> كلمة المرور</label>
                    <input type="password" id="password" placeholder="أدخل كلمة المرور" required>
                    <div class="password-hint">يجب أن تحتوي على 8 أحرف على الأقل</div>
                </div>
                
                <div class="input-group">
                    <label><i class="fas fa-lock"></i> تأكيد كلمة المرور</label>
                    <input type="password" id="confirmPassword" placeholder="أعد إدخال كلمة المرور" required>
                </div>
                
                <div class="terms">
                    <input type="checkbox" id="terms" required>
                    <label for="terms">أوافق على <a href="#">شروط الخدمة</a> و <a href="#">سياسة الخصوصية</a></label>
                </div>
                
                <button type="submit" class="signup-btn">
                    <i class="fas fa-user-plus"></i> اشترك الآن
                </button>
                
                <div class="login-link">
                    لديك حساب بالفعل؟ <a href="login.html">تسجيل الدخول</a>
                </div>
                
                <div class="or-divider">أو</div>
                
                <div class="social-signup">
                    <button type="button" class="social-btn"><i class="fab fa-google"></i> جوجل</button>
                    <button type="button" class="social-btn"><i class="fab fa-facebook-f"></i> فيسبوك</button>
                </div>
            </form>
        </div>
        
        <div class="back-home">
            <a href="index.html"><i class="fas fa-arrow-right"></i> العودة للصفحة الرئيسية</a>
        </div>
        
        <footer>
            <p>© 2026 | DZ-SentiVision</p>
        </footer>
    </div>

    <script>
        // رابط الخادم
        const API_URL = 'https://dz-sentivision-api.onrender.com';
        
        // التعامل مع تقديم النموذج
        document.getElementById('signupForm').addEventListener('submit', async function(event) {
            event.preventDefault();
            
            // الحصول على القيم
            const fullname = document.getElementById('fullname').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const terms = document.getElementById('terms').checked;
            
            // التحقق من المدخلات
            if (!fullname || !email || !password) {
                alert('❌ الرجاء ملء جميع الحقول');
                return;
            }
            
            if (password !== confirmPassword) {
                alert('❌ كلمة المرور غير متطابقة');
                return;
            }
            
            if (password.length < 8) {
                alert('❌ كلمة المرور يجب أن تكون 8 أحرف على الأقل');
                return;
            }
            
            if (!terms) {
                alert('❌ يجب الموافقة على الشروط والأحكام');
                return;
            }
            
            // تغيير حالة الزر
            const button = document.querySelector('.signup-btn');
            const originalText = button.innerHTML;
            button.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري إنشاء الحساب...';
            button.disabled = true;
            
            try {
                console.log('محاولة التسجيل:', { fullname, email, password });
                
                // إرسال البيانات
                const response = await fetch(`${API_URL}/api/auth/signup`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        fullname: fullname,
                        email: email,
                        password: password
                    })
                });
                
                console.log('حالة الاستجابة:', response.status);
                
                // تحليل الاستجابة
                let data;
                try {
                    data = await response.json();
                } catch (e) {
                    console.error('خطأ في تحليل JSON:', e);
                    throw new Error('استجابة غير صالحة من الخادم');
                }
                
                console.log('بيانات الاستجابة:', data);
                
                // التحقق من النجاح
                if (data && data.success === true) {
                    alert('✅ تم إنشاء الحساب بنجاح!');
                    
                    // حفظ بيانات المستخدم
                    if (data.user) {
                        localStorage.setItem('user', JSON.stringify(data.user));
                    }
                    
                    // التوجيه إلى صفحة التحليل
                    window.location.href = 'analysis-page.html';
                } else {
                    // عرض رسالة الخطأ
                    const errorMessage = data && data.error ? data.error : 'حدث خطأ غير معروف';
                    alert('❌ ' + errorMessage);
                }
            } catch (error) {
                console.error('خطأ في الاتصال:', error);
                alert('❌ خطأ في الاتصال بالخادم: ' + error.message);
            } finally {
                // إعادة الزر إلى حالته الطبيعية
                button.innerHTML = originalText;
                button.disabled = false;
            }
        });
        
        // التحقق من وجود مستخدم مسجل بالفعل
        const savedUser = localStorage.getItem('user');
        if (savedUser) {
            try {
                const user = JSON.parse(savedUser);
                if (user && user.id) {
                    window.location.href = 'analysis-page.html';
                }
            } catch (e) {
                // تجاهل الأخطاء في تحليل JSON
                localStorage.removeItem('user');
            }
        }
    </script>
</body>
</html>
