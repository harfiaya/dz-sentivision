<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DZ-SentiVision</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=cairo:wght@400;700&display=swap"rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {

            background-image: linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.5)),url('nano.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 0;
           
        }
        
        .container {
            width: 100%;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            font-family: 'cairo',sans-serif;
        }
        
        header {
            text-align: center;
            color: white;
            padding: 20px;
            width: 100%;
            display: flex;
            flex-direction: column;
        }
        
        .logo {
            font-size: 3.5rem;
            margin-bottom: 2px;
            margin-bottom: 2px;
            color: rgb(213, 226, 231);
        }
        
        h1 {
            font-size: 4rem;
            font-weight: 800;
            margin-bottom: 5px;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.3);
            text-align: center;
        }
        h3 {
            font-size: 2rem;
            font-weight: 600;
            line-height: 1.2;
            text-align: center;
            margin-top: 2px;
            margin-bottom: 2px;
        }
        
        .subtitle {
            font-size: 1.3rem;
            opacity: 0.9;
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
        }
        
        .content {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            width: 1000px;
            justify-content: center;
            margin-top: 2px;
        }
        
        .card {
            background-color: rgb(213, 226, 231);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            padding: 30px;
            width: 100%;
            max-width: 500px;
            transition: transform 0.3s ease;
        
        }
        
        .card:hover {
            transform: translateY(-10px);
        }
        
        .card h2 {
            color: #5e9de4;
            margin-bottom: 20px;
            font-size: 1.8rem;
            border-bottom: 2px solid #308dea;
            padding-bottom: 2px;
        }
        
        .description {
            line-height: 1.8;
            font-size: 1.1rem;
            margin-bottom: 2px;
            color: #444;
        }
        
        .features {
            list-style: none;
            margin-bottom: 5px;
        }
        
        .features li {
            padding: 10px 0;
            border-bottom: 2px solid #eee;
            display: flex;
            align-items: center;
        }
        
        .features li i {
            color: #627ff2;
            margin-left: 10px;
            font-size: 1.2rem;
        }
        
        .start-btn {
            display: block;
            width: 20%;
            padding: 10px;
            background: linear-gradient(to right, #67ace5, #04446c);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            text-decoration: none;
            margin-top: 1px;
            margin-bottom: 1px;
        }
        
        .start-btn:hover {
            background: linear-gradient(to right, #044f7e, #4997d7);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transform: scale(1.03);
        }
        

        .code-container {
            background-color: #f5f5f5;
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
            direction: ltr;
            text-align: left;
            overflow-x: auto;
           
        }
        
        .code-container pre {
            font-family: 'Courier New', monospace;
            color: #333;
            line-height: 1.5;
        }
        
        .code-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
            direction: rtl;
        }
        
        .copy-btn {
            background-color: #153cbe;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: background-color 0.3s;
        }
        
        .copy-btn:hover {
            background-color: #091d59;
        }
        
        .note {
            background-color: #fff9e6;
            border-right: 4px solid #FFD700;
            padding: 15px;
            border-radius: 5px;
            margin-top: 1px;
            font-size: 0.95rem;
        }
        
        footer {
            color: white;
            text-align: center;
            padding: 2px;
            margin-top: 1px;
            font-size: 1.2rem;
            opacity: 0.8;
            width: 100%;
            margin-top: 1px;
            margin-bottom: 1px;
        }
        
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <img src="222.png" alt="logo" style="width: 300px; height: auto;">
            </div>
            <h2> نظام ذكي جزائري لتحليل المشاعر  </h2>
               <h2> يعتمد على النصوص والصور لاستخراج المشاعر بدقة</h2>
        </header>
        
        <div class="content" style="display: flex; gap: 20px; justify-content: center;">
            <a href="login.html" class="start-btn" style="width: auto; padding: 10px 30px;">
                <i class="fas fa-sign-in-alt"></i> تسجيل الدخول
            </a>
            <a href="signup.html" class="start-btn" style="width: auto; padding: 10px 30px; background: linear-gradient(to right, #308dea, #67ace5);">
                <i class="fas fa-user-plus"></i> اشترك الآن
            </a>
        </div>
        
        <footer>
            <p>© 2026 | DZ-SentiVision </p>
        </footer>
    </div>

</body>
</html>
