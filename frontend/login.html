<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - DZ-SentiVision</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', 'Segoe UI', sans-serif;
        }
        
        body {
            background-image: linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.5)),url('nano.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 20px;
        }
        
        .logo {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .logo img {
            width: 200px;
            height: auto;
        }
        
        .login-card {
            background-color: rgb(213, 226, 231);
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
            padding: 40px 30px;
            width: 100%;
            transition: transform 0.3s ease;
        }
        
        .login-card:hover {
            transform: translateY(-5px);
        }
        
        .login-card h2 {
            color: #07264a;
            font-size: 2rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 3px solid #308dea;
            padding-bottom: 15px;
        }
        
        .input-group {
            margin-bottom: 25px;
        }
        
        .input-group label {
            display: block;
            color: #07264a;
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .input-group input {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #ddd;
            border-radius: 50px;
            font-size: 1rem;
            transition: all 0.3s;
            background-color: white;
        }
        
        .input-group input:focus {
            outline: none;
            border-color: #308dea;
            box-shadow: 0 0 10px rgba(48, 141, 234, 0.3);
        }
        
        .forgot-password {
            text-align: left;
            margin-bottom: 20px;
        }
        
        .forgot-password a {
            color: #04446c;
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.3s;
        }
        
        .forgot-password a:hover {
            color: #308dea;
            text-decoration: underline;
        }
        
        .login-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(to right, #04446c, #308dea);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }
        
        .login-btn:hover {
            background: linear-gradient(to right, #308dea, #04446c);
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .signup-link {
            text-align: center;
            color: #07264a;
            font-size: 1.1rem;
        }
        
        .signup-link a {
            color: #04446c;
            font-weight: 700;
            text-decoration: none;
            transition: color 0.3s;
        }
        
        .signup-link a:hover {
            color: #308dea;
            text-decoration: underline;
        }
        
        .or-divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 20px 0;
            color: #07264a;
        }
        
        .or-divider::before,
        .or-divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #308dea;
        }
        
        .or-divider::before {
            margin-left: 10px;
        }
        
        .or-divider::after {
            margin-right: 10px;
        }
        
        .social-login {
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        
        .social-btn {
            background-color: white;
            border: 2px solid #308dea;
            border-radius: 50px;
            padding: 10px 20px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1rem;
            color: #07264a;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .social-btn i {
            color: #308dea;
            font-size: 1.2rem;
        }
        
        .social-btn:hover {
            background-color: #308dea;
            color: white;
        }
        
        .social-btn:hover i {
            color: white;
        }
        
        .back-home {
            text-align: center;
            margin-top: 20px;
        }
        
        .back-home a {
            color: white;
            text-decoration: none;
            font-size: 1rem;
            transition: color 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        
        .back-home a:hover {
            color: #308dea;
        }
        
        footer {
            color: white;
            text-align: center;
            padding: 10px;
            margin-top: 10px;
            font-size: 1rem;
            opacity: 0.8;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <img src="222.png" alt="DZ-SentiVision">
        </div>
        
        <div class="login-card">
            <h2>تسجيل الدخول</h2>
            
            <form id="loginForm" onsubmit="return false;">
                <div class="input-group">
                    <label><i class="fas fa-envelope"></i> البريد الإلكتروني</label>
                    <input type="email" id="email" placeholder="أدخل بريدك الإلكتروني" required>
                </div>
                
                <div class="input-group">
                    <label><i class="fas fa-lock"></i> كلمة المرور</label>
                    <input type="password" id="password" placeholder="أدخل كلمة المرور" required>
                </div>
                
                <div class="forgot-password">
                    <a href="#">نسيت كلمة المرور؟</a>
                </div>
                
                <button type="submit" class="login-btn" onclick="handleLogin()">
                    <i class="fas fa-sign-in-alt"></i> دخول
                </button>
                
                <div class="signup-link">
                    ليس لديك حساب؟ <a href="signup.html">اشترك الآن</a>
                </div>
                
                <div class="or-divider">أو</div>
                
                <div class="social-login">
                    <button class="social-btn"><i class="fab fa-google"></i> جوجل</button>
                    <button class="social-btn"><i class="fab fa-facebook-f"></i> فيسبوك</button>
                </div>
            </form>
        </div>
        
        <div class="back-home">
            <a href="index.html"><i class="fas fa-arrow-right"></i> العودة للصفحة الرئيسية</a>
        </div>
        
        <footer>
            <p>© 2026 | DZ-SentiVision</p>
        </footer>
    </div>

    <script>
        // استخدام رابط Render للخادم
        const API_URL = 'https://dz-sentivision-api.onrender.com';
        
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            const btn = document.querySelector('.login-btn');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري تسجيل الدخول...';
            btn.disabled = true;
            
            try {
                const response = await fetch(`${API_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    alert('تم تسجيل الدخول بنجاح!');
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = 'analysis-page.html';
                } else {
                    alert('خطأ: ' + (data.error || 'فشل تسجيل الدخول'));
                }
            } catch (error) {
                alert('خطأ في الاتصال بالخادم');
            } finally {
                btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> دخول';
                btn.disabled = false;
            }
        });
        </script>
</html>
